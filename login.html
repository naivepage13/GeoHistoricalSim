<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoHistoricalSim - Acesso</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

    <div class="container" id="login-form">
        <h2>GeoHistoricalSim</h2>
        <form>
            <div class="input-group">
                <label>E-mail do Comandante</label>
                <input type="email" placeholder="exemplo@geosim.com" required>
            </div>
            <div class="input-group">
                <label>Senha Criptografada</label>
                <input type="password" placeholder="••••••••" required>
            </div>
            <button type="submit">ENTRAR NO SISTEMA</button>
        </form>
        <div class="toggle-link">
            Novo por aqui? <a onclick="toggleForm()">Solicitar Credenciais</a>
        </div>
    </div>

    <div class="container hidden" id="register-form">
        <h2>Novo Cadastro</h2>
        <form>
            <div class="input-group">
                <label>Nome Completo</label>
                <input type="text" placeholder="Seu Nome" required>
            </div>
            <div class="input-group">
                <label>E-mail Corporativo</label>
                <input type="email" placeholder="seuemail@provedor.com" required>
            </div>
            <div class="input-group">
                <label>Definir Senha</label>
                <input type="password" placeholder="Mínimo 8 caracteres" required>
            </div>
            <button type="submit">CRIAR CONTA</button>
        </form>
        <div class="toggle-link">
            Já possui acesso? <a onclick="toggleForm()">Voltar ao Login</a>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        function toggleForm() {
            document.getElementById('login-form').classList.toggle('hidden');
            document.getElementById('register-form').classList.toggle('hidden');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000); // 3 segundos
        }

        // Carregar usuários do localStorage
        function loadUsers() {
            const users = localStorage.getItem('users');
            return users ? JSON.parse(users) : [];
        }

        // Salvar usuários no localStorage
        function saveUsers(users) {
            localStorage.setItem('users', JSON.stringify(users));
        }

        // Manipular registro
        document.getElementById('register-form').querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = this.querySelector('input[type="text"]').value;
            const email = this.querySelector('input[type="email"]').value;
            const password = this.querySelector('input[type="password"]').value;

            const users = loadUsers();
            // Verificar se e-mail já existe
            if (users.find(user => user.email === email)) {
                showToast('E-mail já cadastrado!');
                return;
            }
            users.push({ name, email, password });
            saveUsers(users);
            showToast('Conta criada com sucesso!');
            toggleForm(); // Voltar para login
        });

        // Manipular login
        document.getElementById('login-form').querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = this.querySelector('input[type="email"]').value;
            const password = this.querySelector('input[type="password"]').value;

            const users = loadUsers();
            const user = users.find(user => user.email === email && user.password === password);
            if (user) {
                // Redirecionar para index.html
                window.location.href = 'index.html';
            } else {
                showToast('Credenciais incorretas!');
            }
        });
    </script>
</body>
</html>
