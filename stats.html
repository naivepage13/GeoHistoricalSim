<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Estatísticas do Meu País</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="stats-header">
        <h1>Estatísticas</h1>
        <button onclick="window.location.href='index.html'">Voltar</button>
    </header>
    <div id="stats-container">
        <div class="stat-box" id="box-economic">
            <h2>Economia</h2>
            <p id="stat-economic"></p>
        </div>
        <div class="stat-box" id="box-military">
            <h2>Militar</h2>
            <div id="stat-military"></div>
        </div>
        <div class="stat-box" id="box-agreements">
            <h2>Acordos</h2>
            <p id="stat-agreements"></p>
        </div>
    </div>
    <script>
        const paises = [
            {
                nome: "Brasil",
                poder: 70,
                estabilidade: 100,
                economia: "1.2T",
                acordos: ["ONU", "Mercosul"],
                militar: {
                    terrestre: {
                        soldados_ativos: 220000,
                        soldados_reserva: 450000,
                        equipamento_infantaria: 85000,
                        caminhoes_transporte: 12500,
                        tanques_principais: 350,
                        tanques_reconhecimento: 180
                    },
                    aerea: {
                        aeronaves_transporte: 120,
                        cacas_ataque: 250,
                        helicopteros: 310,
                        aeronaves_patrulha_maritima: 45
                    },
                    naval: {
                        submarinos: 8,
                        navios_guerra: 15,
                        porta_avioes: 1
                    },
                    drones: {
                        kamikase: 420,
                        reconhecimento: 680
                    },
                    misseis: {
                        balisticos: 45,
                        simples: 850,
                        hipersonicos: 25,
                        ogivas_nucleares: 8
                    }
                }
            },
            {
                nome: "Argentina",
                poder: 50,
                estabilidade: 100,
                economia: "450B",
                acordos: ["Mercosul"],
                militar: {
                    terrestre: {
                        soldados_ativos: 95000,
                        soldados_reserva: 180000,
                        equipamento_infantaria: 35000,
                        caminhoes_transporte: 4500,
                        tanques_principais: 120,
                        tanques_reconhecimento: 65
                    },
                    aerea: {
                        aeronaves_transporte: 45,
                        cacas_ataque: 75,
                        helicopteros: 95,
                        aeronaves_patrulha_maritima: 12
                    },
                    naval: {
                        submarinos: 2,
                        navios_guerra: 5,
                        porta_avioes: 0
                    },
                    drones: {
                        kamikase: 80,
                        reconhecimento: 150
                    },
                    misseis: {
                        balisticos: 5,
                        simples: 200,
                        hipersonicos: 0,
                        ogivas_nucleares: 0
                    }
                }
            }
        ];

        function formatarMilitar(dados) {
            let html = '<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; font-size: 0.95em;">';
            
            // Força Terrestre
            html += '<div class="military-card"><h3>🪖 Força Terrestre</h3>';
            html += `<div class="stat-row"><span>Soldados Ativos:</span><span class="stat-value">${dados.terrestre.soldados_ativos.toLocaleString()}</span></div>`;
            html += `<div class="stat-row"><span>Soldados em Reserva:</span><span class="stat-value">${dados.terrestre.soldados_reserva.toLocaleString()}</span></div>`;
            html += `<div class="stat-row"><span>Equipamento de Infantaria:</span><span class="stat-value">${dados.terrestre.equipamento_infantaria.toLocaleString()}</span></div>`;
            html += `<div class="stat-row"><span>Caminhões de Transporte:</span><span class="stat-value">${dados.terrestre.caminhoes_transporte.toLocaleString()}</span></div>`;
            html += `<div class="stat-row"><span>Tanques Principais:</span><span class="stat-value">${dados.terrestre.tanques_principais.toLocaleString()}</span></div>`;
            html += `<div class="stat-row"><span>Tanques de Reconhecimento:</span><span class="stat-value">${dados.terrestre.tanques_reconhecimento.toLocaleString()}</span></div>`;
            html += '</div>';
            
            // Força Aérea
            html += '<div class="military-card"><h3>✈️ Força Aérea</h3>';
            html += `<div class="stat-row"><span>Aeronaves de Transporte:</span><span class="stat-value">${dados.aerea.aeronaves_transporte.toLocaleString()}</span></div>`;
            html += `<div class="stat-row"><span>Caças de Ataque:</span><span class="stat-value">${dados.aerea.cacas_ataque.toLocaleString()}</span></div>`;
            html += `<div class="stat-row"><span>Helicópteros:</span><span class="stat-value">${dados.aerea.helicopteros.toLocaleString()}</span></div>`;
            html += `<div class="stat-row"><span>Patrulha Marítima:</span><span class="stat-value">${dados.aerea.aeronaves_patrulha_maritima.toLocaleString()}</span></div>`;
            html += '</div>';
            
            // Força Naval
            html += '<div class="military-card"><h3>🚢 Força Naval</h3>';
            html += `<div class="stat-row"><span>Submarinos:</span><span class="stat-value">${dados.naval.submarinos.toLocaleString()}</span></div>`;
            html += `<div class="stat-row"><span>Navios de Guerra:</span><span class="stat-value">${dados.naval.navios_guerra.toLocaleString()}</span></div>`;
            html += `<div class="stat-row"><span>Porta-Aviões:</span><span class="stat-value">${dados.naval.porta_avioes.toLocaleString()}</span></div>`;
            html += '</div>';
            
            // Drones
            html += '<div class="military-card"><h3>🚁 Drones</h3>';
            html += `<div class="stat-row"><span>Drones Kamikase:</span><span class="stat-value">${dados.drones.kamikase.toLocaleString()}</span></div>`;
            html += `<div class="stat-row"><span>Drones de Reconhecimento:</span><span class="stat-value">${dados.drones.reconhecimento.toLocaleString()}</span></div>`;
            html += '</div>';
            
            // Mísseis
            html += '<div class="military-card"><h3>🚀 Mísseis e Armas Estratégicas</h3>';
            html += `<div class="stat-row"><span>Mísseis Balísticos:</span><span class="stat-value">${dados.misseis.balisticos.toLocaleString()}</span></div>`;
            html += `<div class="stat-row"><span>Mísseis Simples:</span><span class="stat-value">${dados.misseis.simples.toLocaleString()}</span></div>`;
            html += `<div class="stat-row"><span>Mísseis Hipersônicos:</span><span class="stat-value">${dados.misseis.hipersonicos.toLocaleString()}</span></div>`;
            html += `<div class="stat-row"><span>Ogivas Nucleares:</span><span class="stat-value">${dados.misseis.ogivas_nucleares.toLocaleString()}</span></div>`;
            html += '</div>';
            
            html += '</div>';
            return html;
        }

        function loadStats() {
            const nome = localStorage.getItem('meuPais');
            if (!nome) {
                alert('Nenhum país selecionado.');
                window.location.href = 'index.html';
                return;
            }
            const p = paises.find(x => x.nome === nome);
            if (!p) {
                alert('Dados do país não encontrados.');
                return;
            }
            document.getElementById('stat-economic').textContent = p.economia || 'N/A';
            document.getElementById('stat-military').innerHTML = formatarMilitar(p.militar);
            document.getElementById('stat-agreements').textContent = (p.acordos || []).join(', ');
        }

        loadStats();
    </script>
</body>
</html>
