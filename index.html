<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>GeoHistoricalSim v0.1</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; display: flex; }
        #sidebar { width: 300px; border-right: 1px solid #444; padding: 20px; }
        #main { flex-grow: 1; padding: 20px; }
        .pais-card { background: #333; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
        .btn-atacar { background: #ff4444; color: white; border: none; padding: 5px 10px; cursor: pointer; }
        .estabilidade-bar { background: #555; height: 10px; width: 100%; margin-top: 5px; }
        .progresso { background: #44ff44; height: 100%; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Países</h2>
        <div id="lista-paises">
            </div>
    </div>

    <div id="main">
        <h1>Centro de Comando Geopolítico</h1>
        <div id="console" style="background: black; height: 300px; padding: 10px; overflow-y: scroll;">
            <p>> Sistema inicializado. Aguardando ordens...</p>
        </div>
    </div>

    <script>
        // Aqui conectaremos a lógica que já começamos a criar
        const paises = [
            { nome: "Brasil", poder: 70, estabilidade: 100 },
            { nome: "Argentina", poder: 50, estabilidade: 100 }
        ];

        function renderizar() {
            const lista = document.getElementById('lista-paises');
            lista.innerHTML = paises.map(p => `
                <div class="pais-card">
                    <strong>${p.nome}</strong><br>
                    Poder: ${p.poder}
                    <div class="estabilidade-bar"><div class="progresso" style="width: ${p.estabilidade}%"></div></div>
                    <button class="btn-atacar" onclick="atacar('${p.nome}')">Atacar</button>
                </div>
            `).join('');
        }

        function atacar(nome) {
            document.getElementById('console').innerHTML += `<p>> Ataque iniciado contra ${nome}...</p>`;
        }

        renderizar();
    </script>
</body>
</html>
