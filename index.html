<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>GeoHistoricalSim v0.1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="sidebar">
        <h2>Países</h2>
        <div id="lista-paises">
        </div>
    </div>

    <div id="main">
        <h1>Centro de Comando Geopolítico</h1>
        <div id="console">
            <p>> Sistema inicializado. Aguardando ordens...</p>
        </div>
    </div>

    <div id="actions-sidebar">
        <h2>Ações do Jogador</h2>
        <div class="action-group">
            <label for="diplomatic">Ações Diplomáticas</label>
            <textarea id="diplomatic" placeholder="Insira ações diplomáticas..."></textarea>
            <button onclick="submitAction('diplomatic')">Executar Diplomática</button>
        </div>
        <div class="action-group">
            <label for="military">Ações Militares</label>
            <textarea id="military" placeholder="Insira ações militares..."></textarea>
            <button onclick="submitAction('military')">Executar Militar</button>
        </div>
        <div class="action-group">
            <label for="general">Ações Gerais</label>
            <textarea id="general" placeholder="Insira ações gerais..."></textarea>
            <button onclick="submitAction('general')">Executar Geral</button>
        </div>
        <div class="action-group">
            <label for="economic">Ações Econômicas</label>
            <textarea id="economic" placeholder="Insira ações econômicas..."></textarea>
            <button onclick="submitAction('economic')">Executar Econômica</button>
        </div>
    </div>

    <script>
        // Aqui conectaremos a lógica que já começamos a criar
        const paises = [
            { nome: "Brasil", poder: 70, estabilidade: 100 },
            { nome: "Argentina", poder: 50, estabilidade: 100 }
        ];

        function renderizar() {
            const lista = document.getElementById('lista-paises');
            lista.innerHTML = paises.map(p => `
                <div class="pais-card">
                    <strong>${p.nome}</strong><br>
                    Poder: ${p.poder}
                    <div class="estabilidade-bar"><div class="progresso" style="width: ${p.estabilidade}%"></div></div>
                    <button class="btn-atacar" onclick="atacar('${p.nome}')">Atacar</button>
                </div>
            `).join('');
        }

        function atacar(nome) {
            document.getElementById('console').innerHTML += `<p>> Ataque iniciado contra ${nome}...</p>`;
        }

        function submitAction(type) {
            const textarea = document.getElementById(type);
            const action = textarea.value.trim();
            if (action) {
                document.getElementById('console').innerHTML += `<p>> Ação ${type} executada: ${action}</p>`;
                // Aqui, integrar com o engine Python para gerar narração
                textarea.value = ''; // Limpar após enviar
            }
        }

        renderizar();
    </script>
</body>
</html>
