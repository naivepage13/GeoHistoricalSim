<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoHistoricalSim - Formulário de Ação</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="site-header">
        <div class="header-content">
            <h1 class="site-title">GeoHistoricalSim</h1>
            <div class="header-nav">
                <a href="index.html" class="nav-link">Jogo</a>
                <a href="stats.html" class="nav-link">Estatísticas</a>
                <a href="login.html" class="nav-link">Sair</a>
            </div>
        </div>
    </nav>

    <div class="action-page-container">
        <div class="action-page-header">
            <button class="btn-voltar" onclick="voltarIndex()">← Voltar</button>
            <h1 id="page-title">Formulário de Ação</h1>
        </div>

        <div class="action-page-content">
            <!-- Formulário à esquerda -->
            <div class="action-form-container">
                <form id="action-form" class="action-page-form" onsubmit="submitAction(event)">
                    <div class="form-field">
                        <label for="action-name">Nome da Ação</label>
                        <input type="text" id="action-name" placeholder="Ex: Assinatura de Tratado" required oninput="atualizarDocumento()">
                    </div>
                    <div class="form-field">
                        <label for="action-invest">Investimento Monetário</label>
                        <input type="text" id="action-invest" placeholder="$ 0,00" required onkeyup="formatarMoeda(event)" oninput="atualizarDocumento()">
                    </div>
                    <div class="form-field">
                        <label for="action-desc">Descrição da Ação</label>
                        <textarea id="action-desc" placeholder="Descreva a ação detalhadamente..." required oninput="atualizarDocumento()"></textarea>
                    </div>
                    <div class="form-field">
                        <label for="action-nations">Nações Envolvidas</label>
                        <input type="text" id="action-nations" placeholder="Ex: Brasil, Argentina, Chile" required oninput="atualizarDocumento()">
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn-submit">Executar Ação</button>
                        <button type="button" class="btn-cancel" onclick="voltarIndex()">Cancelar</button>
                    </div>
                </form>
            </div>

            <!-- Documento oficial à direita -->
            <div class="document-container">
                <div class="document-paper">
                    <h1 id="doc-name" class="document-title">-</h1>

                    <p id="doc-desc" class="document-content">-</p>

                    <div class="document-financial">
                        <p>Investimento: <strong id="doc-invest">-</strong></p>
                    </div>

                    <div class="document-bottom">
                        <p class="document-nations"><span id="doc-nations">-</span></p>
                        <p class="document-signature">Data: <span id="doc-date">-</span></p>
                        <p class="document-stamp">_____________________<br><span class="signature-label">Assinatura Digital</span></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let actionType = '';
        const actionLabels = {
            'diplomatic': 'Ação Diplomática',
            'military': 'Ação Militar',
            'general': 'Ação Geral',
            'economic': 'Ação Econômica'
        };

        // Inicializar quando o DOM estiver pronto
        document.addEventListener('DOMContentLoaded', function() {
            // Obter o tipo de ação da URL
            const params = new URLSearchParams(window.location.search);
            actionType = params.get('type') || 'general';

            // Validar tipo de ação
            if (!actionLabels[actionType]) {
                actionType = 'general';
            }

            // Atualizar titulo da página
            document.getElementById('page-title').textContent = actionLabels[actionType];
            
            // Inicializar documento com data
            document.getElementById('doc-date').textContent = new Date().toLocaleDateString('pt-BR');
            
            // Inicializar sincronização
            atualizarDocumento();
        });

        // Função para atualizar o documento em tempo real
        function atualizarDocumento() {
            const nameInput = document.getElementById('action-name');
            const investInput = document.getElementById('action-invest');
            const descInput = document.getElementById('action-desc');
            const nationsInput = document.getElementById('action-nations');

            const name = nameInput ? nameInput.value : '-';
            const invest = investInput ? investInput.value : '-';
            const desc = descInput ? descInput.value : '-';
            let nations = nationsInput ? nationsInput.value : '-';

            // Processar nações: separar por vírgula e juntar com &
            if (nations && nations !== '-') {
                nations = nations
                    .split(',')
                    .map(n => n.trim())
                    .filter(n => n.length > 0)
                    .join(' & ');
            }

            // Atualizar elementos do documento
            const docName = document.getElementById('doc-name');
            const docInvest = document.getElementById('doc-invest');
            const docNations = document.getElementById('doc-nations');
            const docDesc = document.getElementById('doc-desc');

            if (docName) docName.textContent = name || '-';
            if (docInvest) docInvest.textContent = invest && invest !== '-' ? invest : '-';
            if (docNations) docNations.textContent = nations || '-';
            if (docDesc) docDesc.textContent = desc || '-';
        }

        // Função para formatar moeda
        function formatarMoeda(event) {
            let input = event.target;
            let valor = input.value;

            // Remove caracteres não numéricos
            valor = valor.replace(/\D/g, '');

            // Se vazio, limpa
            if (valor === '') {
                input.value = '';
                atualizarDocumento();
                return;
            }

            // Converte para número e formata
            let numero = parseInt(valor, 10);
            let centavos = numero % 100;
            let reais = Math.floor(numero / 100);

            // Formata com separador de milhares
            let reaisFormatado = reais.toLocaleString('pt-BR');

            // Monta o valor final
            let valorFormatado = `$ ${reaisFormatado},${String(centavos).padStart(2, '0')}`;

            input.value = valorFormatado;
            atualizarDocumento();
        }

        // Função para enviar a ação
        function submitAction(event) {
            event.preventDefault();

            // Extrai apenas os números do campo de investimento formatado
            const investValue = document.getElementById('action-invest').value.replace(/\D/g, '');
            const investNumerico = investValue ? parseInt(investValue, 10) / 100 : 0;

            const actionData = {
                type: actionType,
                name: document.getElementById('action-name').value,
                investment: investNumerico,
                description: document.getElementById('action-desc').value,
                nations: document.getElementById('action-nations').value
            };

            if (actionData.name && actionData.investment >= 0 && actionData.description && actionData.nations) {
                // Armazenar a ação no localStorage
                let actions = JSON.parse(localStorage.getItem('actions')) || [];
                actions.push({
                    ...actionData,
                    timestamp: new Date().toISOString()
                });
                localStorage.setItem('actions', JSON.stringify(actions));

                // Exibir mensagem de sucesso e voltar
                alert(`Ação "${actionData.name}" executada com sucesso!`);
                window.location.href = 'index.html';
            }
        }

        // Função para voltar
        function voltarIndex() {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
